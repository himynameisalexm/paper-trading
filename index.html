<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alex :: trading terminal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green:  #3ddc84;
  --red:    #ff5555;
  --text:   #909090;
  --bright: #e0e0e0;
  --label:  #555555;
  --sub:    #404040;
  --border: #1e1e1e;
  --bg:     #080808;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── scanlines ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ── vignette ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
  z-index: 999;
}

/* ── cursor blink ── */
.cursor {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--green);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1.1s step-end infinite;
  box-shadow: 0 0 6px var(--green);
}
@keyframes blink { 50% { opacity: 0; } }

/* ── boot screen ── */
#boot {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: opacity 0.6s ease;
}
#boot.hidden { opacity: 0; pointer-events: none; }

.boot-line {
  font-size: 13px;
  color: var(--sub);
  opacity: 0;
  transform: translateY(2px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  white-space: pre;
}
.boot-line.show       { opacity: 1; transform: translateY(0); }
.boot-line.bright     { color: var(--text); }
.boot-line.green-text { color: var(--green); }
.boot-line.gold-text  { color: #c8963a; }

/* ── main layout ── */
#app {
  opacity: 0;
  transition: opacity 0.5s ease;
  padding: 32px 40px;
  max-width: 960px;
  margin: 0 auto;
}
#app.show { opacity: 1; }

/* ── header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  margin-bottom: 24px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 {
  color: var(--bright);
  font-size: 13px;
  font-weight: normal;
  letter-spacing: 0.04em;
}
.header-left .sub {
  color: var(--label);
  font-size: 11px;
  margin-top: 3px;
}
.header-right {
  font-size: 11px;
  color: var(--label);
  text-align: right;
}
#clockDisplay { color: var(--sub); }

/* ── status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--label);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid #141414;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--sub);
  flex-shrink: 0;
  transition: background 0.4s, box-shadow 0.4s;
}
.dot.ok   { background: var(--green); box-shadow: 0 0 6px rgba(61,220,132,0.4); }
.dot.err  { background: var(--red); }
.dot.spin { background: #c8963a; animation: pulse 0.9s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

#statusText { transition: color 0.3s; }
.refresh-btn {
  background: none;
  border: 1px solid #242424;
  color: var(--label);
  padding: 2px 10px;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  margin-left: auto;
  transition: border-color 0.2s, color 0.2s;
  letter-spacing: 0.04em;
}
.refresh-btn:hover { border-color: #555; color: var(--bright); }

/* ── summary bar ── */
.summary {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid #141414;
}
.stat label {
  color: var(--label);
  font-size: 10px;
  display: block;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.stat .val {
  font-size: 15px;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.stat .val.green { color: var(--green); }
.stat .val.red   { color: var(--red); }
.stat .val.dim   { color: var(--sub); }

/* ── section label ── */
.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--label);
  margin-bottom: 12px;
  margin-top: 28px;
}
.section-label:first-child { margin-top: 0; }

/* ── open position card ── */
.open-card {
  border: 1px solid #1e2e26;
  background: #060a08;
  padding: 20px 24px;
  margin-bottom: 28px;
  position: relative;
  animation: slideIn 0.4s ease forwards;
}
.open-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: 0.25;
}

.open-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.open-ticker {
  font-size: 18px;
  font-weight: bold;
  color: var(--bright);
  letter-spacing: 0.06em;
}
.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.badge-open      { color: var(--text);  border: 1px solid #2a2a2a; animation: pulse 1.6s ease-in-out infinite; }
.badge-win       { color: var(--green); border: 1px solid #1e3828; }
.badge-loss      { color: var(--red);   border: 1px solid #3a1e1e; }
.badge-cash      { color: var(--sub);   border: 1px solid #242424; }
.badge-mktopen   { color: var(--green); border: 1px solid #1e3828; }
.badge-mktclosed { color: var(--label); border: 1px solid #242424; }
.badge-mktpre    { color: #c8963a;      border: 1px solid #3a2e14; }

.live-price-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 14px;
}
.live-price {
  font-size: 28px;
  color: var(--bright);
  font-variant-numeric: tabular-nums;
  transition: color 0.4s;
}
.live-price.up   { color: var(--green); }
.live-price.down { color: var(--red); }
.live-change { font-size: 12px; color: var(--text); }

.open-levels {
  display: flex;
  gap: 28px;
  font-size: 12px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  color: var(--text);
}
.open-levels span { color: var(--label); margin-right: 4px; }

/* progress bar */
.prog-wrap { margin-bottom: 12px; }
.prog-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--label);
  margin-bottom: 5px;
}
.prog-track {
  height: 2px;
  background: #181818;
  position: relative;
  overflow: visible;
}
.prog-fill {
  height: 100%;
  background: var(--green);
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute;
  right: -2px; top: -3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}
.prog-fill.loss { background: var(--red); }
.prog-fill.loss::after { background: var(--red); box-shadow: 0 0 8px var(--red); }

.unrealized {
  font-size: 14px;
  font-weight: bold;
  margin-top: 8px;
}
.open-note {
  font-size: 11px;
  color: var(--sub);
  margin-top: 6px;
  font-style: italic;
}
.open-source {
  font-size: 10px;
  color: var(--label);
  margin-top: 4px;
}

/* ── trade rows ── */
.trade {
  border-left: 2px solid #1a1a1a;
  padding: 13px 0 13px 20px;
  margin-bottom: 1px;
  cursor: default;
  transition: background 0.15s, padding-left 0.15s, border-color 0.15s;
  opacity: 0;
  animation: slideIn 0.35s ease forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}
.trade:hover { background: rgba(255,255,255,0.015); padding-left: 28px; }
.trade.win:hover  { border-left-color: var(--green); }
.trade.loss:hover { border-left-color: var(--red); }

.trade-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.trade-date   { color: var(--label); font-size: 11px; }
.trade-ticker {
  color: var(--bright);
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.05em;
  transition: color 0.15s;
}
.trade:hover .trade-ticker { color: #fff; }
.trade.cash .trade-ticker  { color: var(--sub); }

.trade-prices {
  display: flex;
  gap: 18px;
  font-size: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
  align-items: center;
  color: var(--text);
}
.trade-prices span { color: var(--label); margin-right: 3px; }
.arrow { color: var(--sub); font-size: 11px; transition: color 0.2s; }
.trade.win:hover  .arrow { color: var(--green); }
.trade.loss:hover .arrow { color: var(--red); }

.pnl { font-size: 12px; font-weight: bold; margin-bottom: 6px; }
.pnl.green { color: var(--green); }
.pnl.red   { color: var(--red); }

/* expandable reasoning */
.toggle {
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: color 0.15s;
}
.toggle:hover { color: var(--text); }
.caret { display: inline-block; transition: transform 0.2s; font-size: 9px; }
.toggle.open .caret { transform: rotate(90deg); }

.reasoning-body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.3s ease, opacity 0.25s;
}
.reasoning-body.open { max-height: 300px; opacity: 1; }
.reasoning-text {
  color: var(--label);
  font-size: 11.5px;
  line-height: 1.8;
  max-width: 680px;
  padding-top: 6px;
}
.trade-note {
  color: var(--sub);
  font-size: 11px;
  margin-top: 4px;
  font-style: italic;
  transition: color 0.2s;
}
.trade:hover .trade-note { color: var(--label); }

hr.divider { border: none; border-top: 1px solid #121212; margin: 1px 0; }

/* ── watchlist ── */
.wl-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 9px 0;
  border-bottom: 1px solid #121212;
  transition: background 0.15s;
  flex-wrap: wrap;
}
.wl-row:hover { background: rgba(255,255,255,0.012); }
.wl-rank  { color: var(--sub); font-size: 11px; min-width: 18px; }
.wl-ticker { color: var(--bright); font-weight: bold; font-size: 13px; letter-spacing: 0.05em; min-width: 44px; }
.wl-open-tag { font-size: 10px; color: var(--sub); border: 1px solid #2a2a2a; padding: 1px 5px; }
.wl-conf-wrap { display: flex; align-items: center; gap: 6px; min-width: 88px; }
.wl-conf-track { width: 54px; height: 2px; background: #181818; flex-shrink: 0; }
.wl-conf-fill  { height: 100%; }
.wl-conf-val   { color: var(--text); font-size: 11px; }
.wl-price { color: var(--bright); font-size: 12px; font-variant-numeric: tabular-nums; min-width: 64px; }
.wl-chg   { font-size: 11px; min-width: 52px; }
.wl-chg.green { color: var(--green); }
.wl-chg.red   { color: var(--red); }
.wl-reasons   { color: var(--label); font-size: 11px; flex: 1; }
.wl-sentiment { font-size: 10px; min-width: 52px; text-align: right; }
.wl-sentiment.bull { color: var(--green); }
.wl-sentiment.bear { color: var(--red); }
.wl-sentiment.neut { color: var(--sub); }

/* ── footer ── */
.footer {
  margin-top: 40px;
  padding-top: 12px;
  border-top: 1px solid #141414;
  color: var(--sub);
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

/* ── typewriter ── */
.typewriter-wrap { display: inline; }

/* ── glitch on load ── */
@keyframes glitch {
  0%   { text-shadow: 2px 0 var(--red), -2px 0 #44aaff; }
  25%  { text-shadow: -2px 0 var(--red), 2px 0 #44aaff; }
  75%  { text-shadow: none; }
  100% { text-shadow: none; }
}
.glitch { animation: glitch 0.4s ease forwards; }
</style>
</head>

  { text: `  sessions loaded: ${TRADES.length}`, cls: 'bright', delay: 1050 },
  { text: 'connecting to price APIs...', delay: 1200 },
  { text: '  binance.com      → OK', cls: 'green-text', delay: 1380 },

];

function runBoot() {
  const container = document.getElementById('bootLines');
  let maxDelay = 0;

  BOOT_LINES.forEach(({ text, cls = '', delay }) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'boot-line ' + cls;
      el.textContent = text;
      container.appendChild(el);
      requestAnimationFrame(() => {
        setTimeout(() => el.classList.add('show'), 16);
      });
    }, delay);
    maxDelay = Math.max(maxDelay, delay);
  });

  setTimeout(() => {
    document.getElementById('boot').classList.add('hidden');
    const app = document.getElementById('app');
    app.classList.add('show');
    setTimeout(init, 300);
  }, maxDelay + 500);
}

// ═══════════════════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}
async function getJSON(url, ms = 5000) {
  try {
    const res = await withTimeout(fetch(url, { mode: 'cors' }), ms);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('[price]', url, e.message);
    return null;
  }
}

function fmt(n, d = 2) { return Number(n).toFixed(d); }
function fmtPrice(n) {
  if (n >= 10000) return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return '$' + Number(n).toFixed(2);
}
function fmtPnl(n) {
  const abs = Math.abs(n).toFixed(2);
  return (n >= 0 ? '+$' : '−$') + Number(abs).toLocaleString('en-US');
}
function fmtPct(n) {
  return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
}

// ═══════════════════════════════════════════════════════════════════════════
//  PRICE FETCHING
// ═══════════════════════════════════════════════════════════════════════════
async function fetchCrypto(trade) {
  const sym = trade.binanceSymbol;
  const cid = trade.cryptoId;
  const tk  = trade.ticker;

  if (sym) {
    const [t, h] = await Promise.all([
      getJSON(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`, 4000),
      getJSON(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`, 4000),
    ]);
    if (t && t.price) {
      const price = parseFloat(t.price);
      const pct   = h ? parseFloat(h.priceChangePercent) : null;
      return { price, pct, source: 'Binance' };
    }
  }

  if (cid) {
    const d = await getJSON(
      `https://min-api.cryptocompare.com/data/pricemultifull?fsyms=${tk}&tsyms=USD`, 5000
    );
    if (d && d.RAW && d.RAW[tk]) {
      const r = d.RAW[tk].USD;
      return { price: r.PRICE, pct: r.CHANGEPCT24HOUR, source: 'CryptoCompare' };
    }
  }

  if (cid) {
    const d = await getJSON(
      `https://api.coingecko.com/api/v3/simple/price?ids=${cid}&vs_currencies=usd&include_24hr_change=true`, 6000
    );
    if (d && d[cid]) {
      return { price: d[cid].usd, pct: d[cid].usd_24h_change ?? null, source: 'CoinGecko' };
    }
  }

  const d = await getJSON(`https://api.coinbase.com/v2/prices/${tk}-USD/spot`, 5000);
  if (d && d.data && d.data.amount) {
    return { price: parseFloat(d.data.amount), pct: null, source: 'Coinbase' };
  }

  return null;
}

async function fetchStock(trade) {
  const yahooUrl = (host) =>
    `https://${host}.finance.yahoo.com/v8/finance/chart/${trade.ticker}?interval=1m&range=1d`;

  function parseYahoo(d) {
    const meta  = d.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose || meta.previousClose;
    const pct   = ((price - prev) / prev) * 100;
    return { price, pct, source: 'Yahoo Finance' };
  }

  // 1. Direct Yahoo (works on github.io, blocked on localhost)
  for (const host of ['query1', 'query2']) {
    const d = await getJSON(yahooUrl(host), 5000);
    try { return parseYahoo(d); } catch (_) {}
  }

  // 2. CORS proxy fallback (for local preview)
  const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl('query1'))}`;
  const d = await getJSON(proxyUrl, 7000);
  try { return parseYahoo(d); } catch (_) {}

  return null;
}

async function fetchLive(trade) {
  if (trade.type === 'crypto') return fetchCrypto(trade);
  if (trade.type === 'stock')  return fetchStock(trade);
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
//  MARKET HOURS
// ═══════════════════════════════════════════════════════════════════════════
function marketStatus() {
  const now = new Date();
  const month = now.getUTCMonth();
  const etOff = (month >= 2 && month <= 10) ? -4 : -5;
  const etH = now.getUTCHours() + etOff;
  const etM = now.getUTCMinutes();
  const day = now.getUTCDay();
  if (day === 0 || day === 6) return 'closed';
  const mins = etH * 60 + etM;
  if (mins >= 240 && mins < 570)  return 'pre';
  if (mins >= 570 && mins < 960)  return 'open';
  if (mins >= 960 && mins < 1200) return 'after';
  return 'closed';
}

function mktBadge(type) {
  if (type === 'crypto') return `<span class="badge badge-mktopen">24/7</span>`;
  const s = marketStatus();
  if (s === 'open')  return `<span class="badge badge-mktopen">mkt open</span>`;
  if (s === 'pre')   return `<span class="badge badge-mktpre">pre-mkt</span>`;
  return `<span class="badge badge-mktclosed">mkt closed</span>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  CALCULATIONS
// ═══════════════════════════════════════════════════════════════════════════
function calcClosed(t) {
  if (!t.buy || !t.sell) return { pnlDollar: 0, pnlPct: 0 };
  const pnlPct    = (t.sell.price - t.buy.price) / t.buy.price;
  const pnlDollar = pnlPct * t.capital;
  return { pnlDollar, pnlPct: pnlPct * 100 };
}

function calcOpen(t, livePrice) {
  if (!t.buy || !livePrice) return null;
  const pnlPct    = (livePrice - t.buy.price) / t.buy.price;
  const pnlDollar = pnlPct * t.capital;
  const range     = t.target - t.stop;
  const progress  = Math.max(0, Math.min(1, (livePrice - t.stop) / range));
  return { pnlDollar, pnlPct: pnlPct * 100, progress };
}

function summarise(unrealizedPnlMap = {}) {
  let totalPnl = 0, wins = 0, losses = 0, cashSessions = 0, closed = 0;
  for (const t of TRADES) {
    if (t.type === 'cash') { cashSessions++; continue; }
    if (t.sell) {
      const { pnlDollar } = calcClosed(t);
      totalPnl += pnlDollar;
      closed++;
      if (pnlDollar >= 0) wins++; else losses++;
    }
  }
  // Add all unrealized P&Ls from open positions
  for (const v of Object.values(unrealizedPnlMap)) totalPnl += v;
  const winRate = closed > 0 ? Math.round((wins / closed) * 100) : null;
  return { totalPnl, wins, losses, closed, cashSessions, winRate };
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════════════════════════════════
function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const span = document.getElementById('statusText');
  dot.className  = 'dot ' + state;
  span.textContent = text;
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER SUMMARY
// ═══════════════════════════════════════════════════════════════════════════
function renderSummary(unrealizedPnlMap = {}) {
  const s = summarise(unrealizedPnlMap);
  const openCount = TRADES.filter(t => !t.sell && t.type !== 'cash').length;

  document.getElementById('summary').innerHTML = `
    <div class="stat">
      <label>total p&amp;l</label>
      <div class="val ${s.totalPnl >= 0 ? 'green' : 'red'}" id="pnlVal">${fmtPnl(s.totalPnl)}</div>
    </div>
    <div class="stat">
      <label>open</label>
      <div class="val ${openCount > 0 ? 'green' : 'dim'}">${openCount} / ${CONFIG.rules.maxPositions}</div>
    </div>
    <div class="stat">
      <label>closed</label>
      <div class="val">${s.closed}</div>
    </div>
    <div class="stat">
      <label>wins</label>
      <div class="val green">${s.wins}</div>
    </div>
    <div class="stat">
      <label>losses</label>
      <div class="val ${s.losses > 0 ? 'red' : 'dim'}">${s.losses}</div>
    </div>
    <div class="stat">
      <label>win rate</label>
      <div class="val ${s.winRate === 100 ? 'green' : ''}">${s.winRate !== null ? s.winRate + '%' : '—'}</div>
    </div>
    <div class="stat">
      <label>pool</label>
      <div class="val">$${CONFIG.totalCapital.toLocaleString()}</div>
    </div>
    <div class="stat">
      <label>aud/usd</label>
      <div class="val dim">${CONFIG.audusd}</div>
    </div>
  `;

  // Animate P&L counter
  const el = document.getElementById('pnlVal');
  if (el && s.totalPnl !== 0) {
    const target = s.totalPnl;
    const dur = 1200;
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - t, 4);
      el.textContent = fmtPnl(eased * target);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
}

//  RENDER OPEN CARDS — supports multiple concurrent positions

function cardId(idx, key) { return `oc-${idx}-${key}`; }

  const count = openTrades.length;
  sec.innerHTML = `
    <div class="section-label">open position${count > 1 ? 's (' + count + ')' : ''}</div>

        ${mktBadge(trade.type)}
        <span style="color:var(--label);font-size:11px">${trade.broker}</span>
        <span style="color:var(--label);font-size:11px;margin-left:auto">$${(trade.capital||0).toLocaleString()} deployed</span>
      </div>
      <div class="live-price-row">
        <div class="live-price" id="${cardId(idx,'price')}" style="opacity:0.35">—</div>
        <div class="live-change" id="${cardId(idx,'chg')}"></div>
      </div>

        <div><span>entry</span>${fmtPrice(trade.buy.price)}</div>
        <div><span>stop</span><span style="color:var(--red)">${fmtPrice(trade.stop)}</span></div>
        <div><span>target</span><span style="color:var(--green)">${fmtPrice(trade.target)}</span></div>
        <div><span>entered</span>${trade.buy.time || trade.date}</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-labels">
          <span>stop ${fmtPrice(trade.stop)}</span>
          <span>target ${fmtPrice(trade.target)}</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" id="${cardId(idx,'prog')}" style="width:0%"></div>
        </div>
      </div>
      <div class="unrealized" id="${cardId(idx,'pnl')}" style="opacity:0.35">—</div>
      <div class="open-source" id="${cardId(idx,'src')}"></div>
      ${trade.note ? `<div class="open-note">${trade.note}</div>` : ''}
      ${trade.reasoning ? `
      <div class="toggle" id="toggle-oc${idx}" onclick="toggleReason('oc${idx}')" style="margin-top:10px">
        <span class="caret">▶</span> thesis
      </div>

        <div class="reasoning-text">${trade.reasoning}</div>
      </div>` : ''}
    </div>`).join('')}`;
}

// unrealizedMap: { idx: pnlDollar }
const _unrealizedMap = {};

function updateOpenCard(idx, trade, liveData) {
  const pe  = document.getElementById(cardId(idx, 'price'));
  const ce  = document.getElementById(cardId(idx, 'chg'));
  const ue  = document.getElementById(cardId(idx, 'pnl'));
  const pf  = document.getElementById(cardId(idx, 'prog'));
  const src = document.getElementById(cardId(idx, 'src'));
  if (!pe) return;

  const isUp = liveData.price >= trade.buy.price;
  pe.style.opacity = '1';
  pe.className     = 'live-price ' + (isUp ? 'up' : 'down');
  pe.textContent   = fmtPrice(liveData.price);

  if (ce && liveData.pct !== null && liveData.pct !== undefined) {
    ce.className   = 'live-change ' + (liveData.pct >= 0 ? 'green' : 'red');
    ce.textContent = (liveData.pct >= 0 ? '+' : '') + liveData.pct.toFixed(2) + '% 24h';
  }

  const calc = calcOpen(trade, liveData.price);
  if (calc) {
    if (ue) {
      ue.style.opacity = '1';
      ue.className     = 'unrealized ' + (calc.pnlDollar >= 0 ? 'green' : 'red');
      ue.textContent   = fmtPnl(calc.pnlDollar) + ' (' + fmtPct(calc.pnlPct) + ')';
    }
    if (pf) {
      pf.className   = 'prog-fill' + (!isUp ? ' loss' : '');
      pf.style.width = (calc.progress * 100) + '%';
    }
    _unrealizedMap[idx] = calc.pnlDollar;
  }
  if (src) {
    src.textContent = `source: ${liveData.source} · ${new Date().toLocaleTimeString('en-AU', { timeZone: 'Australia/Brisbane' })} AEST`;
  }

  renderSummary({ ..._unrealizedMap });
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER WATCHLIST
// ═══════════════════════════════════════════════════════════════════════════
function renderWatchlist() {
  const el = document.getElementById('watchlistSection');
  if (!WATCHLIST || !WATCHLIST.scannedAt || !WATCHLIST.candidates.length) {
    el.innerHTML = '';
    return;
  }

  const rows = WATCHLIST.candidates.map((c, i) => {
    const confPct  = Math.round(c.confidence * 10);
    const confCol  = c.confidence >= 8 ? 'var(--green)' : c.confidence >= 7 ? '#c8963a' : 'var(--sub)';
    const chgCls   = c.pctChg >= 0 ? 'green' : 'red';
    const sentCls  = c.sentimentLabel === 'bullish' ? 'bull' : c.sentimentLabel === 'bearish' ? 'bear' : 'neut';
    const earnNote = c.earningsDays != null && c.earningsDays <= 7 ? ` · earnings ${c.earningsDays}d` : '';
    return `
      <div class="wl-row">
        <span class="wl-rank">#${i + 1}</span>
        <span class="wl-ticker">${c.ticker}</span>
        ${c.isOpen ? '<span class="wl-open-tag">open</span>' : ''}
        <div class="wl-conf-wrap">
          <div class="wl-conf-track">
            <div class="wl-conf-fill" style="width:${confPct}%;background:${confCol}"></div>
          </div>
          <span class="wl-conf-val" style="color:${confCol}">${c.confidence}/10</span>
        </div>
        <span class="wl-price">${fmtPrice(c.price)}</span>
        <span class="wl-chg ${chgCls}">${fmtPct(c.pctChg)}</span>
        <span class="wl-reasons">${(c.reasons || []).slice(0, 3).join(' · ')}${earnNote}</span>
        <span class="wl-sentiment ${sentCls}">${c.sentimentLabel}</span>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="section-label" style="margin-bottom:8px">
      watchlist · today's candidates
      <span style="color:var(--sub);font-size:10px;margin-left:10px;text-transform:none;letter-spacing:0">scanned ${WATCHLIST.scannedAt}</span>
    </div>
    <div style="margin-bottom:28px">${rows}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER TRADE HISTORY
// ═══════════════════════════════════════════════════════════════════════════
function renderTradeLog() {
  const el = document.getElementById('tradeLog');
  const closed = TRADES.filter(t => t.sell || t.type === 'cash').reverse();

  if (!closed.length) {
    el.innerHTML = `<div style="color:var(--sub);font-size:12px;padding:12px 0">no closed trades yet</div>`;
    return;
  }

  el.innerHTML = closed.map((t, i) => {
    if (t.type === 'cash') {
      return `
        <div class="trade cash" style="animation-delay:${i * 40}ms">
          <div class="trade-header">
            <span class="trade-date">${t.date}</span>
            <span class="trade-ticker">CASH</span>
            <span class="badge badge-cash">no trade</span>
          </div>
          <div style="color:var(--label);font-size:12px">${t.reasoning || ''}</div>
        </div>
        <hr class="divider">`;
    }

    const { pnlDollar, pnlPct } = calcClosed(t);
    const isWin = pnlDollar >= 0;
    const cls   = isWin ? 'win' : 'loss';
    const id    = 'r' + i;

    return `
      <div class="trade ${cls}" style="animation-delay:${i * 40}ms">
        <div class="trade-header">
          <span class="trade-date">${t.date}</span>
          <span class="trade-ticker">${t.ticker}</span>
          <span class="badge ${isWin ? 'badge-win' : 'badge-loss'}">${isWin ? 'win' : 'loss'}</span>
          <span style="color:var(--label);font-size:11px">${t.broker}</span>
        </div>
        <div class="trade-prices">
          <div><span>buy</span>${fmtPrice(t.buy.price)}<span style="color:var(--sub);font-size:10px;margin-left:4px">${t.buy.time}</span></div>
          <span class="arrow">→</span>
          <div><span>sell</span>${fmtPrice(t.sell.price)}<span style="color:var(--sub);font-size:10px;margin-left:4px">${t.sell.time}</span></div>
          <div><span>stop</span>${fmtPrice(t.stop)}</div>
          <div><span>target</span>${fmtPrice(t.target)}</div>
        </div>
        <div class="pnl ${isWin ? 'green' : 'red'}">${fmtPnl(pnlDollar)} (${fmtPct(pnlPct)})</div>
        ${t.reasoning ? `
          <div class="toggle" id="toggle-${id}" onclick="toggleReason('${id}')">
            <span class="caret">▶</span> thesis
          </div>
          <div class="reasoning-body" id="body-${id}">
            <div class="reasoning-text">${t.reasoning}</div>
            ${t.note ? `<div class="trade-note">${t.note}</div>` : ''}
          </div>` : ''}
      </div>
      <hr class="divider">`;
  }).join('');
}

function toggleReason(id) {
  const toggle = document.getElementById('toggle-' + id);
  const body   = document.getElementById('body-' + id);
  if (!toggle || !body) return;
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════════════════
function updateClock() {
  const el = document.getElementById('clockDisplay');
  const mkt = document.getElementById('mktStatusDisplay');
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleTimeString('en-AU', {
    timeZone: 'Australia/Brisbane',
    hour12: false,
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }) + ' AEST';

  const s = marketStatus();
  const labels = { open: 'US mkt open', pre: 'US pre-market', after: 'US after-hours', closed: 'US mkt closed' };
  if (mkt) mkt.textContent = labels[s] || '';
}

// ═══════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════
async function init() {
  updateClock();
  setInterval(updateClock, 1000);

  const ft = document.getElementById('footerTs');
  if (ft) ft.textContent = 'last updated: ' + CONFIG.lastUpdated;

  renderWatchlist();
  renderTradeLog();

  const openTrades = TRADES.filter(t => !t.sell && t.type !== 'cash');

  if (!openTrades.length) {
    document.getElementById('openSection').innerHTML = '';
    renderSummary({});
    setStatus('ok', 'no open positions');
    return;
  }

  // Render all shells immediately
  renderAllOpenShells(openTrades);
  renderSummary({});
  setStatus('spin', `fetching prices for ${openTrades.map(t => t.ticker).join(', ')}...`);

  // Per-trade fetch + update
  async function fetchOne(idx, trade) {
    try {
      const d = await fetchLive(trade);
      if (d) { updateOpenCard(idx, trade, d); return d; }
    } catch (e) { console.warn('[price]', trade.ticker, e.message); }
    return null;
  }

  // Initial fetch — all in parallel, retry failures up to 5×
  const results = await Promise.all(openTrades.map((t, i) => fetchOne(i, t)));
  const failed  = openTrades.filter((_, i) => !results[i]);

  if (failed.length) {
    let attempts = 0;
    const retry = setInterval(async () => {
      attempts++;
      await Promise.all(failed.map((t, i) => fetchOne(openTrades.indexOf(t), t)));
      if (attempts >= 5) clearInterval(retry);
    }, 3000);
  }

  const loaded = openTrades.filter((_, i) => results[i]);
  if (loaded.length) {
    setStatus('ok', `live · ${loaded.map(t => t.ticker).join(', ')} · ${new Date().toLocaleTimeString('en-AU', { timeZone: 'Australia/Brisbane' })} AEST`);
  } else {
    setStatus('err', 'price feeds unavailable — retrying...');
  }

  // Auto-refresh each trade on its own interval
  openTrades.forEach((trade, idx) => {
    const interval = trade.type === 'crypto' ? 30000 : 60000;
    setInterval(() => fetchOne(idx, trade), interval);
  });
}

// ── Start ──
runBoot();
